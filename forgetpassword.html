<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | SNOWKbArticles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(-45deg, #081120, #0f1f3d, #0a2a43, #102a1f, #0d3b66);
      background-size: 400% 400%;
      animation: gradientFlow 18s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #62d84e, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #e2e8f0;
    }

    input {
      width: 100%;
      padding: 16px 18px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: #62d84e;
      box-shadow: 0 0 0 4px rgba(98, 216, 78, 0.15);
    }

    input::placeholder {
      color: #94a3b8;
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #62d84e, #63df4e);
      color: #032d42;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(99, 223, 78, 0.35);
    }

    .message {
      display: none;
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #bbf7d0;
      text-align: center;
    }

    .footer-link {
      text-align: center;
      margin-top: 24px;
      color: #cbd5e1;
    }

    .footer-link a {
      color: #62d84e;
      text-decoration: none;
      font-weight: 600;
    }

    .footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">SNOWKbArticles</div>
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your registered email address and we'll send you a link to reset your password.</p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email address" required>
        </div>

        <button type="submit" class="btn">Send Reset Link</button>
      </form>

      <div class="message" id="successMessage">
        Password reset link has been sent to your email.
      </div>

      <div class="footer-link">
        Remember your password? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('successMessage').style.display = 'block';
      this.reset();
    });
  </script>
</body>
</html>
