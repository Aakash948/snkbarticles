<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | SNOWKbArticles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="forget.css" media="screen">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">SNOWKbArticles</div>
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your registered email address and we'll send you a link to reset your password.</p>

      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email address" required>
        </div>

        <button type="submit" class="btn">Send Reset Link</button>
      </form>

      <div class="message" id="successMessage">
        Password reset link has been sent to your email.
      </div>

      <div class="footer-link">
        Remember your password? <a href="signin.html">Sign In</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      document.getElementById('successMessage').style.display = 'block';
      this.reset();
    });
  </script>
</body>
</html>
