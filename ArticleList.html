<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Articles | SNOWKbArticles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #081120, #0f1f3d, #0d2b45);
      color: #fff;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .page-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 30px; flex-wrap: wrap; gap: 20px;
    }
    .page-title h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 8px; }
    .page-title p { color: #cbd5e1; }
    .search-box { width: 360px; max-width: 100%; }
    .search-box input {
      width: 100%; padding: 14px 20px; border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08); color: #fff;
      outline: none; backdrop-filter: blur(10px);
    }
    .table-wrapper {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(14px);
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: rgba(255,255,255,0.08); }
    th, td { padding: 20px 24px; text-align: left; }
    th {
      font-size: 0.9rem; font-weight: 700; color: #e2e8f0;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    td {
      border-top: 1px solid rgba(255,255,255,0.08);
      color: #dbe4f0;
    }
    tbody tr:hover { background: rgba(255,255,255,0.06); }
    .kb-link {
      color: #38bdf8;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
    }
    .kb-link:hover {
      color: #7dd3fc;
      text-decoration: underline;
    }
    .state {
      display: inline-block; padding: 6px 12px; border-radius: 999px;
      font-size: 0.8rem; font-weight: 600;
    }
    .published { background: rgba(34,197,94,0.18); color: #86efac; }
    .draft, .review { background: rgba(245,158,11,0.18); color: #fcd34d; }
    .retired, .outdated { background: rgba(239,68,68,0.18); color: #fca5a5; }
    .footer-info { margin-top: 18px; color: #94a3b8; text-align: right; }
    .loading, .error {
      text-align: center; padding: 40px; color: #cbd5e1;
    }
    @media (max-width: 1024px) {
      .table-wrapper { overflow-x: auto; }
      table { min-width: 1000px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <div class="page-title">
        <h1>Knowledge Articles</h1>
        <p>Browse and manage published knowledge base articles.</p>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by KB number, description, or category...">
      </div>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>KB Number</th>
            <th>Short Description</th>
            <th>Category</th>
            <th>State</th>
          </tr>
        </thead>
        <tbody id="articlesTableBody">
          <tr><td colspan="4" class="loading">Loading knowledge articles...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="footer-info" id="recordCount"></div>
  </div>

  <script>
    const CONFIG = {
      apiUrl: 'https://dev328143.service-now.com/api/1019898/knowledgelist_retrieve',
      username: 'integration_user',
      password: 'Hack@7017'
    };

    let allArticles = [];

    async function fetchKnowledgeArticles() {
      try {
        const response = await fetch(CONFIG.apiUrl, {
          method: 'GET',
          headers: {
            'Authorization': 'Basic ' + btoa(`${CONFIG.username}:${CONFIG.password}`),
            'Accept': 'application/json'
          }
        });

        if (!response.ok) throw new Error('Failed to fetch knowledge articles');

        const data = await response.json();
        allArticles = data.result?.articles || [];
        renderArticles(allArticles);
      } catch (error) {
        console.error(error);
        document.getElementById('articlesTableBody').innerHTML =
          `<tr><td colspan="4" class="error">Error loading articles: ${error.message}</td></tr>`;
      }
    }

    function getStateClass(state = '') {
      return state.toLowerCase().replace(/\s+/g, '-');
    }

    function renderArticles(articles) {
      const tbody = document.getElementById('articlesTableBody');
      const recordCount = document.getElementById('recordCount');

      if (!articles.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="loading">No articles found.</td></tr>';
        recordCount.textContent = '0 articles found';
        return;
      }

      tbody.innerHTML = articles.map(article => `
        <tr>
          <td>
            <a href="kbview.html?kb=${encodeURIComponent(article.number || '')}" class="kb-link">
              ${article.number || ''}
            </a>
          </td>
          <td>${(article.short_description || '').trim()}</td>
          <td>${article.kb_category || 'N/A'}</td>
          <td><span class="state ${getStateClass(article.workflow_state)}">${article.workflow_state || 'N/A'}</span></td>
        </tr>
      `).join('');

      recordCount.textContent = `${articles.length} article${articles.length !== 1 ? 's' : ''} found`;
    }

    document.getElementById('searchInput').addEventListener('input', function() {
      const query = this.value.toLowerCase().trim();
      const filtered = allArticles.filter(article =>
        (article.number || '').toLowerCase().includes(query) ||
        (article.short_description || '').toLowerCase().includes(query) ||
        (article.kb_category || '').toLowerCase().includes(query) ||
        (article.workflow_state || '').toLowerCase().includes(query)
      );
      renderArticles(filtered);
    });

    fetchKnowledgeArticles();
  </script>
</body>
</html>
