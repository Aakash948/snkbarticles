<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | SNOWKbArticles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #081120, #0f1f3d, #0a2a43, #102a1f, #0d3b66);
      background-size: 500% 500%;
      animation: gradientFlow 18s ease infinite;
      padding: 20px;
      overflow: hidden;
    }

    @keyframes gradientFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .signin-container {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
      color: #fff;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #62d84e, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      color: #cbd5e1;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: #ffffff;
      color: #111827;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s ease;
      margin-bottom: 24px;
    }

    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 255, 255, 0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: rgba(255, 255, 255, 0.7);
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
    }

    .divider span {
      margin: 0 15px;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #e2e8f0;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      border-color: #62d84e;
      box-shadow: 0 0 0 3px rgba(98, 216, 78, 0.2);
    }

    .form-group input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.9rem;
    }

    .options a {
      color: #62d84e;
      text-decoration: none;
    }

    .signin-btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #62d84e, #4ade80);
      color: #032d42;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .signin-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(98, 216, 78, 0.35);
    }

    .signup-link {
      text-align: center;
      margin-top: 25px;
      color: #cbd5e1;
    }

    .signup-link a {
      color: #62d84e;
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .signin-container {
        padding: 30px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="signin-container">
    <div class="logo">
      <h1>Welcome Back</h1>
      <p>Sign in to continue to SNOWKbArticles</p>
    </div>

    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22 12.2c0-.8-.1-1.6-.2-2.3H12v4.4h5.6c-.2 1.4-1 2.6-2.1 3.4v2.8h3.4c2-1.8 3.1-4.6 3.1-8.3z"/>
        <path fill="#34A853" d="M12 22c2.8 0 5.2-.9 6.9-2.5l-3.4-2.8c-.9.6-2.1 1-3.5 1-2.7 0-5-1.8-5.8-4.3H2.7v2.9C4.4 19.7 7.9 22 12 22z"/>
        <path fill="#FBBC05" d="M6.2 13.4c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V6.7H2.7C1.9 8.2 1.5 10 1.5 11.5s.4 3.3 1.2 4.8l3.5-2.9z"/>
        <path fill="#EA4335" d="M12 5.3c1.5 0 2.9.5 3.9 1.5l2.9-2.9C17.2 2.4 14.8 1.5 12 1.5c-4.1 0-7.6 2.3-9.3 5.7l3.5 2.9C7 7.1 9.3 5.3 12 5.3z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <form id="signinForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="options">
        <label>
          <input type="checkbox"> Remember me
        </label>
        <a href="forgetpassword.html">Forgot Password?</a>
      </div>

      <button type="submit" class="signin-btn">Sign In</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="registrationpage.html">Create Account</a>
    </div>
  </div>

  <script>
    function signInWithGoogle() {
      alert('Google Sign-In integration can be added using Firebase or Google OAuth 2.0.');
    }

    document.getElementById('signinForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        alert('Please fill in all required fields.');
        return;
      }

      const button = document.querySelector('.signin-btn');
      button.textContent = 'Signing In...';
      button.disabled = true;

      setTimeout(() => {
        alert(`Welcome back! Signed in as ${email}`);
        button.textContent = 'Sign In';
        button.disabled = false;
        this.reset();
      }, 1500);
    });
  </script>
</body>
</html>
