<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | SNOWKbArticles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="signin.css" media="screen">
  <script src="https://accounts.google.com/gsi/client" async defer></script>

</head>
<body>
  <div class="signin-container">
    <div class="logo">
      <h1>Welcome Back</h1>
      <p>Sign in to continue to SNOWKbArticles</p>
    </div>

    <div id="g_id_onload"
         data-client_id="20303005742-dhp7730tduf0ofe8ceoolog6ug7k482i.apps.googleusercontent.com"
         data-context="signin"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>

    <div class="google-wrapper">
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="outline"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left"
           data-width="380">
      </div>
    </div>

    <div class="divider"><span>or sign in with email</span></div>

    <form id="signinForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>
      </div>

      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="forgetpassword.html">Forgot Password?</a>
      </div>

      <button type="submit" class="signin-btn">Sign In</button>
    </form>

    <div class="signup-link">
      Don't have an account? <a href="registrationpage.html">Create Account</a>
    </div>
  </div>

  <script src="signin.js"></script>
</body>
</html>
